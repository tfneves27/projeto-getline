name: Build APK

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa seu código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Prepara o Python 3.10 (Versão super estável para Kivy)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Instala Java 17 (Necessário para o Android SDK)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Instala as dependências do Linux (Igual fazíamos no Colab)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libltdl-dev \
            libffi-dev \
            libssl-dev \
            libncurses5-dev \
            libsqlite3-dev \
            tk-dev \
            libgdbm-dev \
            libc6-dev \
            libbz2-dev \
            libtool \
            autoconf \
            automake \
            zlib1g-dev \
            zip \
            unzip \
            libstdc++6 \
            libgtk2.0-0 \
            libcanvas-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev

      # 5. Instala o Buildozer
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      # 6. Limpa e Gera o APK
      - name: Build APK
        working-directory: ./frontend
        run: |
          buildozer android clean
          yes | buildozer android debug

      # 7. Salva o APK para você baixar
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: getline-apk
          path: frontend/bin/*.apk